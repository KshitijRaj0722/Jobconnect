# Spring Datasource Configuration (MySQL)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/jonconnect?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:Kshitij@2210}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Server Port
server.port=${PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:3d6f2a8b1c9e4f7a0d5b2e8c1f4a7d0e3b6c9f2a5d8b1e4f7a0c3d6e9f2a5b8}
jwt.expiration=86400000

# Twilio SMS Gateway Configuration
twilio.account.sid=${TWILIO_ACCOUNT_SID:ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
twilio.auth.token=${TWILIO_AUTH_TOKEN:your_auth_token_here}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+1234567890}
