# Spring Datasource Configuration (PostgreSQL)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/jobconnect}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.main.lazy-initialization=true
spring.jpa.hibernate.ddl-auto=update
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server Port
server.port=${PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:3d6f2a8b1c9e4f7a0d5b2e8c1f4a7d0e3b6c9f2a5d8b1e4f7a0c3d6e9f2a5b8}
jwt.expiration=86400000
twilio.account.sid=${TWILIO_ACCOUNT_SID:ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
twilio.auth.token=${TWILIO_AUTH_TOKEN:your_auth_token_here}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+1234567890}

