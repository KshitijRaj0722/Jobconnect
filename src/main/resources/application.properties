# Spring Datasource Configuration (MySQL)
# Note: Using database name 'jonconnect' as requested. Ensure this database exists in your MySQL Workbench.
spring.datasource.url=jdbc:mysql://localhost:3306/jonconnect?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Kshitij@2210
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Thymeleaf Configuration
# Disable cache for development to allow hot swapping of HTML templates without server restart
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Server Port
server.port=8080

# Twilio SMS Gateway Configuration
# Replace these with your actual Twilio account details when deploying/testing
twilio.account.sid=ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
twilio.auth.token=your_auth_token_here
twilio.phone.number=+1234567890
