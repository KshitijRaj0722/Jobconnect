<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - JobConnect</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="auth-container">
        <div class="glass-card">
            <h2 class="brand-title">JobConnect</h2>
            <p class="brand-subtitle">Sign in to manage your jobs or applications</p>

            <!-- Registration Success Notification -->
            <div th:if="${param.success}" class="alert alert-success">
                <span>Account created! Please sign in.</span>
            </div>

            <!-- Logout Notification -->
            <div th:if="${param.logout}" class="alert alert-success">
                <span>You have been logged out successfully.</span>
            </div>

            <!-- Login Error Notification -->
            <div th:if="${param.error}" class="alert alert-error">
                <span>Invalid email or password.</span>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" name="email" class="form-input" placeholder="name@example.com" required autocomplete="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account yet? 
                <a th:href="@{/register}" class="auth-link">Sign Up</a>
            </div>
        </div>
    </div>
</body>
</html>
